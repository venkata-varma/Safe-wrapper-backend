  /api/card-connect/integrations-master/fetch-funding-data-for-the-day/{accountId}:
    post:
      tags:
        - Authorize -  Merchant only
      summary: "Retrieve live funding data from card-connect for the given day"
      description: |
        - This API takes a date in `YYYY-MM-DD` format in the body.
        - Calls `Funding API` for the given day.
        - For each transaction:
          - If it does not exist, creates an entry.
          - If it exists with the same `status`, no entry is made.
          - If it exists with different `status`, the record is updated.
        - Requires authentication via the `Authorization` header.
        - Returns statistics about pulled, pushed, updated, and exception counts.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: "Unique account identifier"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  items:
                    type: string
                    format: date
                  example: "2025-09-11"
              required:
                - date
      responses:
        200:
          description: Fetched live funding-txns data succesfully for the given date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Fetched live funding-txns data succesfully for the given date."
                  data:
                    type: object
                    properties:
                      finalResult:
                        type: object
                        properties:
                          accountId:
                            type: string
                            example: "68b6e54bcb20acc231225479"
                          cronJobType:
                            type: string
                            example: "manual"
                          dateRange:
                            type: array
                            items:
                              type: string
                              format: date
                            example: ["2025-09-11"]
                          pulledCount:
                            type: integer
                            example: 115
                          pushedCount:
                            type: integer
                            example: 0
                          updatedCount:
                            type: integer
                            example: 0
                          exceptionsCount:
                            type: integer
                            example: 0

