openapi: 3.0.0
info:
  title: "Safe Wrapper REST API Documentation"
  version: "1.0.0"
  description: |
    This is a REST API application developed with Express.

    ## Recommendations:
    - Ensure that all API requests include the necessary authentication headers if required.
    - Use the `Try it out` feature in Swagger UI to interact with the API and test different request parameters.

  contact:
    name: "Devrabbit- Safe_wrapper"
    url: "https://lhswweb.dev.devrabbit.co/login"
    Email: "akram.shaik@devrabbit.com"

servers:
  - url: "https://lhswapi.dev.devrabbit.co"
    description: "Development Server"

  - url: "http://localhost:8201"
    description: "Local Server"

  #-----------------------------------------------------------------------------------------------------------------------------------

components:
  securitySchemes:
    Authorization:
      type: http
      scheme: bearer
      bearerFormat: JWT

  #-----------------------------------------------------------------------------------------------------------------------------------
  schemas: # This should be properly indented
    User: # The User schema should be correctly nested under schem
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: "Unique identifier for the user."
          nullable: true
        accountId:
          type: string
          format: uuid
          description: "Reference to the account the user belongs to."
          nullable: true
        name:
          type: string
          description: "Full name of the user."
          example: "Devrabbit client"
          default: ""
        password:
          type: string
          description: "Hashed password of the user."
          default: ""
        role:
          type: string
          enum: ["super-admin", "admin", "manager", "support"]
          description: "Role assigned to the user."
          default: "admin"
        phone:
          type: string
          description: "User's phone number."
          pattern: "^[0-9]+$"
          minLength: 10
          maxLength: 15
          example: "0000000000"
          default: ""
          unique: [true, "Phone number has to be unique"]
        email:
          type: string
          format: email
          description: "User's email address."
          example: "nine123@devrabbit.com"
          default: ""
          unique: [true, "Email has to be unique"]
        status:
          type: string
          enum: ["active", "deleted", "blocked"]
          description: "Current status of the user."
          default: "active"
        createdBy:
          type: string
          format: uuid
          description: "Reference to the user who created this record."
          nullable: true
        updatedBy:
          type: string
          format: uuid
          description: "Reference to the user who last updated this record."
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when the user was created."
        updatedAt:
          type: string
          format: date-time
          description: "Timestamp when the user was last updated."
      required:
        - name
        - password
        - phone
        - email
        - password

    Account:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
          description: "Unique identifier for the account."
        accountName:
          type: string
          description: "Name of the account."
          required: true
        accountType:
          type: string
          enum: ["customer", "super-admin"]
          description: "Type of the account."
        companyName:
          type: string
          description: "Company name associated with the account."
        logo:
          type: string
          description: "URL of the company's logo."
        role:
          type: string
          description: "Role of the account, default is 'super-admin'."
        phone:
          type: string
          minLength: 10
          maxLength: 15
          pattern: "^[0-9]+$"
          description: "Mobile number of the account."
          unique: [true, "Phone number has to be unique"]
        email:
          type: string
          format: email
          description: "Email address of the account."
          unique: [true, "Email has to be unique"]
        password:
          type: string
          description: "Hashed password of the account."
        address:
          type: string
          description: "Address of the account holder."
        city:
          type: string
          description: "City of the account holder."
        state:
          type: string
          description: "State of the account holder."
        country:
          type: string
          description: "Country of the account holder."
        pincode:
          type: string
          description: "Pincode of the account holder."
        status:
          type: string
          enum: ["active", "in-progress", "deleted", "blocked"]
          description: "Status of the account."
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when the account was created."
        updatedAt:
          type: string
          format: date-time
          description: "Timestamp when the account was last updated."
      required:
        - accountName
        - accountType
        - companyName
        - phone
        - email
        - password
        - city
        - state
        - country
        - pincode

    WebhookMasters:
      type: object
      properties:
       webhookMasterId:
        type: string
        format: uuid
        example: "60d5ec49c3b2a72e4c8b4567"
       accountId:
        type: string
        format: uuid
        example: "60d5ec49c3b2a72e4c8b4568"
       userId:
        type: string
        format: uuid
        example: "60d5ec49c3b2a72e4c8b4569"
       location:
        type: string
        example: "New York"
       name:
        type: string
        example: "OrderWebhook"
       webHookUrl:
        type: string
        format: uri
        example: "https://api.example.com/webhook"
       authenticationCode:
        type: string
        unique: true
        example: "auth-123456"
       requestObject:
        type: object
        example: { "event": "order_created", "data": { "orderId": "12345" } }
       primaryHookId:
        type: string
        example: "primary-001"
       comments:
        type: string
        example: "Webhook for order processing"
       status:
        type: string
        enum:
        - active
        - offline
        - deleted
        example: "active"
       lastPullDate:
        type: string
        format: date-time
        example: "2024-07-23T10:30:00Z"
       webhookSettings:
        type: object
        properties:
         periodType:
          type: string
          enum:
            - each second
            - once each minute
            - once each hour
            - once each day
            - once each month
          example: "once each day"
         currentStatus:
          type: string
          enum:
            - start
            - stop
          example: "stop"
         interval:
          type: integer
          example: 1
         expiresOn:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00Z"
      required:
       - accountId
       - name
       - webHookUrl
       - authenticationCode
       - webhookSettings

#-----------------------------------------------------------------------------------------------------------------------------------

paths:
  /api/users/user-login:
    post:
      tags:
        - Authorize
      summary: "1. Copy access_token from response || 2. Click Authorize button   ||  3. Place access_token in input box to authorize."
      description: |
        - Copy `access_token` from response  
        - Click the **Authorize** button  
        - Place `access_token` in the input box to authorize.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileEmail:
                  type: string
                  description: "User's mobile number or email"
                  example: "0000000000"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "0000000001"
      # responses:
      #   '200':
      #     description: "Login successfull."
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             accessToken:
      #               type: string
      #               description: "JWT token for authorization"
      #             expirationTime:
      #               type: string
      #               description: "Expiration time of JWT token"
      #   '401':
      #     description: "Unauthorized - Invalid Password."
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             status:
      #               type: string
      #               example: "fail"
      #               description: "Indicates the failure status"
      #             message:
      #               type: string
      #               example: "Invalid Password."
      #               description: "Error message explaining the issue"
      #   '400':
      #     description: "Missing fields in payload to raise the request"
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             status:
      #               type: string
      #               example: "fail"
      #               description: "Indicates the failure status"
      #             message:
      #               type: string
      #               example: "Mobile-Email and Password fields are mandatory."
      #               description: "Mobile-Email and Password fields are mandatory."

      security: [] # No authentication required for login

  #-----------------------------------------------------------------------------------------------------------------------------------
  /api/accounts/create-account:
    post:
      tags:
        - Accounts
      summary: "Create account for first-time visitor"
      description: |
        - Provide the required account details  
        - Upload a profile logo (Image of any format) , if desired
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Account"
              type: object
              properties:
                accountName:
                  type: string
                  description: "Name of the account"
                  example: "fourtwo"
                companyName:
                  type: string
                  description: "Company name"
                  example: "fourtwo"
                phone:
                  type: string
                  description: "User's phone number"
                  example: "9550007949"
                email:
                  type: string
                  format: email
                  description: "User's email"
                  example: "nine@devrabbit.com"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "9550007949"
                address:
                  type: string
                  description: "Street address"
                  example: "3910 S. IH 35 Suite 205"
                city:
                  type: string
                  description: "City"
                  example: "Austin, TX 78704"
                state:
                  type: string
                  description: "State"
                  example: "Texas"
                country:
                  type: string
                  description: "Country"
                  example: "USA"
                pincode:
                  type: string
                  description: "Zip code"
                  example: "78704"
                accountType:
                  type: string
                  description: "Type of account (customer, admin, etc.)"
                  example: "customer"
                timeZone:
                  type: string
                  description: "User's time zone"
                  example: "IST"
                logo:
                  type: string
                  format: binary
                  description: "Upload profile logo (Image of any format)"

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/users/create-user:
    post:
      tags:
        - Users
      summary: "Provision for super-admin of an account to create a user within the same account."
      description: |
        - This endpoint allows the super-admin of an account to create a new user within the same account.  
        - The `name`, `email`, `phone`, and `password` fields are mandatory.

      security:
        - Authorization: [] # Requires Authorization header with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
              type: object
              properties:
                name:
                  type: string
                  description: "Full name of the user"
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  description: "User's email address"
                  example: "john.doe@example.com"
                phone:
                  type: string
                  description: "User's phone number"
                  example: "1234567890"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "SecureP@ssw0rd"
                createdBy:
                  type: string
                  format: uuid
                  description: "Unique identifier for the user."
                  nullable: true
              required:
                - name
                - email
                - phone
                - password

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/users/get-user-details/{userId}:
    get:
      tags:
        - Users
      summary: "Get user details"
      description: |
        - Returns user profile data. Requires authentication."
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user to retrieve"
          schema:
            type: string
      responses:
       200:
        description: "User details retrieved successfully"
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "success"
                message:
                  type: string
                  example: "User details found successfully."
                data:
                  type: object
                  properties:
                    _id:
                      type: string
                      example: "67e3a990e6b6323f811b95e9"
                    userId:
                      type: string
                      example: "67e3a990e6b6323f811b95e9"
                    accountId:
                      type: string
                      example: "67dd4ce3d698258734c22300"
                    name:
                      type: string
                      example: "fourtwo"
                    role:
                      type: string
                      example: "admin"
                    phone:
                      type: string
                      example: "0000000000"
                    email:
                      type: string
                      example: "nine123@devrabbit.com"
                    status:
                      type: string
                      example: "active"
                    createdBy:
                      type: string
                      nullable: true
                      example: null
                    updatedBy:
                      type: string
                      nullable: true
                      example: null
                    createdAt:
                      type: string
                      format: date-time
                      example: "2025-03-26T07:15:28.300Z"
                    updatedAt:
                      type: string
                      format: date-time
                      example: "2025-03-26T07:51:59.203Z"
                    __v:
                      type: integer
                      example: 0

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/users/update-password/{userId}:
    patch:
      tags:
        - Users
      summary: "Update user password"
      description: |
        - Allows an authenticated user to update their password.  
        - The user must provide their **current password** and the **new password**.  
        - Both **currentPassword** and **newPassword** fields are **mandatory**.  
        - Requires authentication via `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user whose password is to be updated"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: "**Mandatory** - The current password of the user"
                  example: "0000000001"
                newPassword:
                  type: string
                  format: password
                  description: "**Mandatory** - The new password to be set"
                  example: "0000000001"

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/users/update-user-details/{userId}:
    patch:
      tags:
        - Users
      summary: "Update user details"
      description: |
        - Allows an authenticated user to update their details.  
        - All fields are **optional**, and the user can update any field they wish.  
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user whose details are to be updated"
          schema:
            type: string
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "User's name"
                  example: "fourtwo-2"
                companyName:
                  type: string
                  description: "User's company name"
                  example: "fourtwo"
                phone:
                  type: string
                  description: "User's phone number"
                  example: "0000000000"
                email:
                  type: string
                  format: email
                  description: "User's email address"
                  example: "nine123@devrabbit.com"

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/users/update-user-status/{userId}:
    patch:
      tags:
        - Users
      summary: "To update user status - Only super-admin users are allowed"

      description: |
        - The **status** field must be either **active** or **deleted**.  
        - Only **super-admin** users have permission to perform this action.  
        - Requires authentication via `Authorization` header.

      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user whose status is to be updated"
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: "**Mandatory** - The status to be updated"
                  enum: ["active", "deleted"]
                  example: "deleted / active"

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/users/get-all-users/{accountId}:
    get:
      tags:
        - Users
      summary: "Get all users under an account - Only super-admin users are allowed"
      description: |
        - Retrieves all users associated with a specific `accountId`.  
        - Only **super-admin** users have permission to access this endpoint.  
        - Requires authentication via `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          description: "The ID of the account whose users are to be fetched"
          schema:
            type: string

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/webhook/create-webhook:
    post:
      tags:
        - Webhooks
      summary: "Get a dedicated HTTPS POST URL with encrypted security token"
      description: |
        - The `accountId` and `name` fields are **mandatory**.  
        - Use this API to get a dedicated **PUSH API** webhook URL to receive real-time updates.  
        - The generated webhook URL can be used to subscribe to events and receive data automatically.  
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookMasters"
              type: object
              required:
                - accountId
                - name
              properties:
                accountId:
                  type: string
                  description: "**Mandatory** - Unique ID of the account"
                  example: "67eb81cb45715d3e5b678ebb"
                name:
                  type: string
                  description: "**Mandatory** - Webhook name"
                  example: "Create work orders"
                location:
                  type: string
                  description: "Optional - Webhook location"
                  example: "California"
                primaryHookId:
                  type: string
                  description: "Optional - Primary identifier for the webhook"
                  example: "WorkOrderId"
                requestObject:
                  type: object
                  description: "Optional - Request payload object"
                  example: {}
  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/webhook/get-individual-webhook-details/{webhookMasterId}:
    get:
      tags:
        - Webhooks
      summary: "Get details of an individual webhook by its unique ID"
      description: |
        - This API retrieves the details of a specific webhook using its unique `webhookMasterId`.  
        - The response includes webhook metadata, such as name, status, and registered events.  
        - Use this endpoint to verify webhook configurations or troubleshoot issues.  
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: webhookMasterId
          in: path
          required: true
          schema:
            type: string
          description: "Unique identifier of the webhook"
      responses:
        '200':
          description: Successfully retrieved webhook details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Webhook details.
                  data:
                    type: object
                    properties:
                      individualWebhookDetails:
                        type: object
                        properties:
                          webhookSettings:
                            type: object
                            properties:
                              periodType:
                                type: string
                                example: once each hour
                              currentStatus:
                                type: string
                                example: stop
                              interval:
                                type: integer
                                example: 1
                              expiresOn:
                                type: string
                                format: date-time
                                example: 2025-03-27T10:31:35.404Z
                          webhookMasterId:
                            type: string
                            nullable: true
                            example: null
                          _id:
                            type: string
                            example: 67e5290765ae64d5acb60a88
                          webHookMasterId:
                            type: string
                            example: 67e5290765ae64d5acb60a88
                          accountId:
                            type: object
                            properties:
                              role:
                                type: string
                                example: super-admin
                              _id:
                                type: string
                                example: 67dd4ce3d698258734c22300
                              accountId:
                                type: string
                                example: 67dd4ce3d698258734c22300
                              noOfIntegrations:
                                type: integer
                                example: 2
                              accountName:
                                type: string
                                example: safe_testaccount
                              accountType:
                                type: string
                                example: customer
                              companyName:
                                type: string
                                example: safe_testaccount
                              logo:
                                type: string
                                example: ""
                              phone:
                                type: string
                                example: 1234567890
                              email:
                                type: string
                                example: safe@gmail.com
                              address:
                                type: string
                                example: aa
                              city:
                                type: string
                                example: HYD
                              state:
                                type: string
                                example: Telangana
                              country:
                                type: string
                                example: India
                              pincode:
                                type: string
                                example: 00000
                              status:
                                type: string
                                example: active
                              createdAt:
                                type: string
                                format: date-time
                                example: 2025-03-21T11:26:27.655Z
                              updatedAt:
                                type: string
                                format: date-time
                                example: 2025-03-21T11:26:27.655Z
                          userId:
                            type: string
                            example: 67dd4ce3d698258734c22302
                          location:
                            type: string
                            example: India
                          name:
                            type: string
                            example: Create work orders
                          webHookUrl:
                            type: string
                            example: https://api.dev.isyncrabbit.com/api/webhook/26031/67dd4ce3d698258734c22300
                          authenticationCode:
                            type: string
                            example: "[secure_hash]"
                          primaryHookId:
                            type: string
                            example: WorkOrderId
                          comments:
                            type: string
                            nullable: true
                            example: null
                          status:
                            type: string
                            example: active
                          createdAt:
                            type: string
                            format: date-time
                            example: 2025-03-27T10:31:35.411Z
                          updatedAt:
                            type: string
                            format: date-time
                            example: 2025-03-27T10:31:35.411Z
                          lastPullDate:
                            type: string
                            format: date-time
                            example: 2025-03-28T06:13:12.239Z
                          __v:
                            type: integer
                            example: 0
    

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/webhook/update-webhook-settings/{webhookMasterId}:
    patch:
      tags:
        - Webhooks
      summary: "Update webhook settings by its unique ID"
      description: |
        - This API allows updating the webhook settings using its unique `webhookMasterId`.  
        - Users can update one or more of the following webhook settings:  
           - `periodType`: Defines the frequency of webhook execution.  
           - `interval`: Specifies the time interval between webhook executions.  
           - `expiresOn`: Sets the expiration date and time for the webhook.  
        - Only the fields provided in the request body will be updated; others will remain unchanged.
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: webhookMasterId
          in: path
          required: true
          schema:
            type: string
          description: "Unique identifier of the webhook"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                periodType:
                  type: string
                  example: "once each hour"
                  description: "Defines the frequency of webhook execution"
                interval:
                  type: integer
                  example: 3
                  description: "Specifies the time interval between webhook executions"
                expiresOn:
                  type: string
                  format: date-time
                  example: "2038-07-12T10:33:50.973+00:00"
                  description: "Sets the expiration date and time for the webhook"
      responses:
        "200":
          description: Webhook settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Webhook settings updated successfully."
            

  #-----------------------------------------------------------------------------------------------------------------------------------

  /api/webhook/get-all-webhook-details/{accountId}:
    get:
      tags:
        - Webhooks
      summary: "Get details of all the webhook URLs registered under an account"
      description: |
        - This API retrieves all webhook details associated with a given `accountId`.  
        - The response includes metadata such as webhook name, status, registered events, and delivery settings.  
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: "Unique identifier of the account for which webhooks are registered"
      responses:
