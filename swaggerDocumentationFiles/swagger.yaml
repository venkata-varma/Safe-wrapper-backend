  /api/machines/get-machine-transactions:
    get:
      tags:
        - API calls
      summary: "Retrieve statistical insights for an individual machine based on desired filters"
      description: |
        - This API provides detailed insights about a specific machine based on desired filters.  
        - By providing query parameters, users can retrieve denomination details, transaction summaries, and other key performance metrics.  
          The available query parameters are:  
          - `serialNumbers`: Filter by the machine's serial numbers.  
          - `transactionTypes`: Filter by the types of transaction `(e.g., CashIn, CashOut)`.  
          - `fromDate`: Retrieve records from this date onward.  `(e.g., 2025-04-21T10:40Z)`
          - `toDate`: Retrieve records up to this date.  `(e.g., 2025-04-28T10:40Z)`
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: serialNumbers
          in: query
          schema:
            type: string
          description: "Unique serial number identifying the machine."

        - name: transactionTypes
          in: query
          schema:
            type: string
          description: "Desired transaction types"

        - name: fromDate
          in: query
          schema:
            type: string
          description: "Desired date from which data to be retreived from.(e.g., 2025-04-21T19:09Z) "

        - name: toDate
          in: query
          schema:
            type: string
          description: "Desired date to which data to be retreived from. (e.g., 2025-04-28T20:09Z)"

      responses:
        200:
          description: Successful response with machine report details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Reports of a single machine based on desired filters
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "67eceef889c3a34af5486760"
                        # webhookMasterId:
                        #   type: string
                        #   example: "67eb8490233046c701342349"
                        # webhookMetaPayloadId:
                        #   type: string
                        #   example: "67eb8588233046c70134244c"
                        # accountId:
                        #   type: string
                        #   example: "67eb81cb45715d3e5b678ebb"
                        pickupGroupId:
                          type: integer
                          example: 566758091
                        serialNumber:
                          type: string
                          example: "QA00577"
                        retrievedOn:
                          type: string
                          format: date-time
                          example: "2025-03-27T17:33:05.4670000Z"
                        transactionDateTime:
                          type: string
                          example: "2025-03-27T09:57:05"
                        userName:
                          type: string
                          example: "TITAN"
                        transactionType:
                          type: string
                          example: "CashIn"
                        amount:
                          type: number
                          example: 10
                        denominations:
                          type: array
                          items:
                            type: object
                            properties:
                              UnitValue:
                                type: number
                                example: 5
                              Count:
                                type: integer
                                example: 2
                              Currency:
                                type: string
                                example: "USD"
                        location:
                          type: string
                          example: "Opal"
                        status:
                          type: string
                          example: "active"
                        createdAt:
                          type: string
                          format: date-time
                          example: "2025-04-02T18:02:00.120Z"
                        updatedAt:
                          type: string
                          format: date-time
                          example: "2025-04-02T08:02:00.120Z"
                        webhookTransactionId:
                          type: string
                          example: "67eceef889c3a34af5486760"
                        __v:
                          type: integer
                          example: 0

  /api/card-connect/integrations-master/fetch-funding-data-for-the-day/{accountId}:
    post:
      tags:
        - Card-connect Integration - Fetching live from Card-connect and also Insights with filters
      summary: "Retrieve live funding data from card-connect for the given day"
      description: |
        - This API takes a date in `YYYY-MM-DD` format in the body.  
        - Calls `Funding API` for the given day.  
        - For each transaction:
          - If it does not exist, creates an entry.  
          - If it exists with the same `status`, no entry is made.  
          - If it exists with different `status`, the record is updated.  
        - Requires authentication via the `Authorization` header.  
        - Returns statistics about pulled, pushed, updated, and exception counts.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: "Unique account identifier"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  items:
                    type: string
                    format: date
                  example: "2025-09-11"
              required:
                - date
      responses:
        200:
          description: Fetched live funding-txns data succesfully for the given date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Fetched live funding-txns data succesfully for the given date."
                  data:
                    type: object
                    properties:
                      finalResult:
                        type: object
                        properties:
                          accountId:
                            type: string
                            example: "68b6e54bcb20acc231225479"
                          cronJobType:
                            type: string
                            example: "manual"
                          dateRange:
                            type: array
                            items:
                              type: string
                              format: date
                            example: ["2025-09-11"]
                          pulledCount:
                            type: integer
                            example: 115
                          pushedCount:
                            type: integer
                            example: 0
                          updatedCount:
                            type: integer
                            example: 0
                          exceptionsCount:
                            type: integer
                            example: 0

  /api/card-connect/integrations-master/fetch-funding-data-for-the-date-range/{accountId}:
    post:
      tags:
        - Card-connect Integration - Fetching live from Card-connect and also Insights with filters
      summary: "Retrieve live funding data from card-connect for the given date range"
      description: |
        - This API takes a `from date` and `to date` in `YYYY-MM-DD` format in the body.  
        - Calls `Funding API` for the each day between the date range with inclusive.  
        - For each transaction:
          - If it does not exist, creates an entry.  
          - If it exists with the same `status`, no entry is made.  
          - If it exists with different `status`, the record is updated.  
        - Requires authentication via the `Authorization` header.  
        - Returns statistics about pulled, pushed, updated, and exception counts.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: "Unique account identifier"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromDate:
                  type: string
                  format: date
                  example: "2025-09-09"
                toDate:
                  type: string
                  format: date
                  example: "2025-09-10"
              required:
                - fromDate
                - toDate
      responses:
        200:
          description: Fetched live funding-txns data succesfully for the given date range.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Fetched live funding-txns data succesfully for the given date range."
                  data:
                    type: object
                    properties:
                      finalResult:
                        type: object
                        properties:
                          accountId:
                            type: string
                            example: "68b6e54bcb20acc231225479"
                          cronJobType:
                            type: string
                            example: "manual"
                          dateRange:
                            type: array
                            items:
                              type: string
                              format: date
                            example: ["2025-09-11"]
                          pulledCount:
                            type: integer
                            example: 115
                          pushedCount:
                            type: integer
                            example: 0
                          updatedCount:
                            type: integer
                            example: 0
                          exceptionsCount:
                            type: integer
                            example: 0

  /api/merchants/machines/get-machine-payload-headers/{accountId}:
    get:
      tags:
        - Smart-filter transaction's dashboard
      summary: "Retrieves details useful in smart filtered transactions' dashboard related to respective merchant's account."
      description: |
        - Specific to `Merchant` account only.
        - This API takes `merchant's` accountId and considers the list of onboarded machines and card-connect integration details, if any.  
        - Details retrieved here are meant to be useful to be used in `Smart filtered transaction's dashboard` in dropdowns.  
        - Requires authentication via the `Authorization` header.  
        - Returns `Payment-types`, `merchant details`, `list of machines onboarded`, `card-connect integration details`.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: "Unique account identifier"
      responses:
        200:
          description: Merchant payload headers retrieved succesfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Merchant payload headers retrieved succesfully."
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          type: string
                        example: ["cima-machine", "card-connect"]
                      merchantNames:
                        type: array
                        items:
                          type: object
                          properties:
                            merchantName:
                              type: string
                              example: "createaccounttest"
                            objectId:
                              type: string
                              example: "68b6e54bcb20acc231225479"
                  webhookPayloadHeadersData:
                    type: object
                    properties:
                      serialNumbers:
                        type: array
                        items:
                          type: string
                        example: ["QA0131", "VV8069"]
                      transactionTypes:
                        type: array
                        items:
                          type: string
                        example: ["CashIn"]
                  merchantPayloadHeaders:
                    type: object
                    properties:
                      transactionStatusKeys:
                        type: array
                        items:
                          type: string
                        example:
                          [
                            "Auth",
                            "Captured",
                            "Voided",
                            "Failure",
                            "Rejected",
                            "Declined",
                            "Settled",
                            "Processed",
                            "Unknown",
                          ]
                      transactionTypeKeys:
                        type: array
                        items:
                          type: string
                        example:
                          [
                            "ACCOUNT VERIFY",
                            "AUTH REQUEST",
                            "CASH ADVANCE",
                            "REFUND",
                            "SALE",
                            "UNKNOWN",
                            "VOID REFUND",
                            "VOID SALE",
                          ]
                      customerDetails:
                        type: array
                        items:
                          type: object
                          properties:
                            cardBrand:
                              type: string
                              example: "visa"
                            cardType:
                              type: string
                              example: "Credit"
                            customerCardNumber:
                              type: string
                              example: "47XXXXXXXXXX1443"
                      batches:
                        type: array
                        items:
                          type: object
                          properties:
                            batchId:
                              type: integer
                              example: 112

  /api/machines/get-machine-payload-headers:
    get:
      tags:
        - Smart-filter transaction's dashboard
      summary: "Retrieves details useful in smart filtered transactions' dashboard related to respective merchant's account."
      description: |
        - Specific to `super-admin` account only.
        - This API takes `merchant's` accountId and considers the list of onboarded machines and card-connect integration details, if any.  
        - Details retrieved here are meant to be useful to be used in `Smart filtered transaction's dashboard` in dropdowns.  
        - Requires authentication via the `Authorization` header.  
        - Returns `Payment-types`, `merchant details`, `list of machines onboarded`, `card-connect integration details`.
      security:
        - Authorization: [] # Requires Authorization header with token

      responses:
        200:
          description: Merchant payload headers retrieved succesfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Merchant payload headers retrieved succesfully."
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          type: string
                        example: ["cima-machine", "card-connect"]
                      merchantNames:
                        type: array
                        items:
                          type: object
                          properties:
                            merchantName:
                              type: string
                              example: "createaccounttest"
                            objectId:
                              type: string
                              example: "68b6e54bcb20acc231225479"
                  webhookPayloadHeadersData:
                    type: object
                    properties:
                      serialNumbers:
                        type: array
                        items:
                          type: string
                        example:
                          [
                            "QA0157",
                            "QA0283",
                            "QA0222",
                            "QA0154",
                            "QA0017",
                            "QA0129",
                            "QA0083",
                            "QA0054",
                            "QA0110",
                            "QA0267",
                            "QA0214",
                            "QA0201",
                            "QA0287",
                            "QA0145",
                            "QA0097",
                            "QA0280",
                            "QA0049",
                            "QA0061",
                            "QA0012",
                            "QA0012",
                          ]
                      transactionTypes:
                        type: array
                        items:
                          type: string
                        example:
                          [
                            "LockOpened",
                            "DoorOpened",
                            "DoorClosed",
                            "LockClosed",
                            "ManualCashTransaction",
                            "CashIn",
                            "DoorWhine",
                          ]
                  merchantPayloadHeaders:
                    type: object
                    properties:
                      transactionStatusKeys:
                        type: array
                        items:
                          type: string
                        example:
                          [
                            "Auth",
                            "Captured",
                            "Voided",
                            "Failure",
                            "Rejected",
                            "Declined",
                            "Settled",
                            "Processed",
                            "Unknown",
                          ]
                      transactionTypeKeys:
                        type: array
                        items:
                          type: string
                        example:
                          [
                            "ACCOUNT VERIFY",
                            "AUTH REQUEST",
                            "CASH ADVANCE",
                            "REFUND",
                            "SALE",
                            "UNKNOWN",
                            "VOID REFUND",
                            "VOID SALE",
                          ]
                      customerDetails:
                        type: array
                        items:
                          type: object
                          properties:
                            cardBrand:
                              type: string
                              example: "visa"
                            cardType:
                              type: string
                              example: "Credit"
                            customerCardNumber:
                              type: string
                              example: "47XXXXXXXXXX1443"
                      batches:
                        type: array
                        items:
                          type: object
                          properties:
                            batchId:
                              type: integer
                              example: 112
