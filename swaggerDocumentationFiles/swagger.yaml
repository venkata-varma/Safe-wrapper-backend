paths:
  /api/users/super-admin-login:
    post:
      tags:
        - Authorize
      summary: "1. Copy access_token from response || 2. Click Authorize button   ||  3. Place access_token in input box to authorize."
      description: |
        - Accessible only for Super-admin
        - Copy `access_token` from response  
        - Click the **Authorize** button  
        - Place `access_token` in the input box to authorize.
        - Set `desired expiration time` for a session in days only.  
          Examples:  
          default is set to `1 day  (1d)`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileEmail:
                  type: string
                  description: "User's mobile number or email"
                  example: "0000000000"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "0000000001"
                sessionExpirationTime:
                  type: string
                  description: "Set desired expiration time for a session in either seconds, minutes ,hours,days, weeks, or years. Example: For minutes- 5m; For hours- 5h; For days - 5d; For Weeks- 5w; For Years- 5y"
                  example: "1d"
      responses:
        200:
          description: "Successful login response"
          content:
            application/json:
              example:
                status: "success"
                message: "Login successfull."
                data:
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2N2RkNTg2ZTZkNjJmYjhkN2FlMWU5NTIiLCJpYXQiOjE3NDQxNzMwNDcsImV4cCI6MTc0NDE3NjY0N30.jQe7XNYuDSkwB3HQNjO2tGfkmyd0aHFO6nMMzj-Mjcc"

      security: [] # No authentication required for login

  /api/merchants/users/user-login:
    post:
      tags:
        - Authorize
      summary: "1. Copy access_token from response || 2. Click Authorize button   ||  3. Place access_token in input box to authorize."
      description: |
        - For `Merchant's` login 
        - Copy `access_token` from response  
        - Click the **Authorize** button  
        - Place `access_token` in the input box to authorize.
        - Set `desired expiration time` for a session in days only.  
          Examples:  
          default is set to `1 day  (1d)`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileEmail:
                  type: string
                  description: "User's mobile number or email"
                  example: "9989765432"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "Integrations9@"
                sessionExpirationTime:
                  type: string
                  description: "Set desired expiration time for a session in either seconds, minutes ,hours,days, weeks, or years. Example: For minutes- 5m; For hours- 5h; For days - 5d; For Weeks- 5w; For Years- 5y"
                  example: "1d"
      responses:
        200:
          description: "Successful login response"
          content:
            application/json:
              example:
                status: "success"
                message: "Login successfull."
                data:
                  accountId: "68b6e54bcb20acc23122****"
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2N2RkNTg2ZTZkNjJmYjhkN2FlMWU5NTIiLCJpYXQiOjE3NDQxNzMwNDcsImV4cCI6MTc0NDE3NjY0N30.jQe7XNYuDSkwB3HQNjO2tGfkmyd0aHFO6nMMzj-Mjcc"

      security: [] # No authentication required for login

