paths:
  /api/webhook/{randomNumber}/{accountId}:
    post:
      tags:
        - Post transactions of machine to webhook.
      summary: "1. Place Number and AccountId assigned to your webhook in path params  || 2. Place secret token given in headers with prefix - Bearer  in Authorization section of Headers    ||  3. Place access_token in input box to authorize.   ||  4.Also visit Useful details which resembles details of all existing merchant accounts"
      description: |
        - Above HTTPS end-point is webhook assigned
        - Purpose is to send transactions of your machine (or) machines. 
        - Use `https://lhswapi.dev.devrabbit.co/api/merchants/machines/get-machine-transactions` to be able to store in ONEPOS Cloud`
        - Follow below security patterns to follow to succesfully send transactions.
          - Place Number and AccountId assigned to your webhook in path params.
          - Place secret token given in headers with prefix - Bearer  in Authorization section of Headers.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: randomNumber
          in: path
          required: true
          description: "Random number assigned to your webhook"
          schema:
            type: string
            example: "14909"
        - name: accountId
          in: path
          required: true
          description: "Account ID assigned to your webhook"
          schema:
            type: string
            example: 68b6e54bcb20acc231225479

        # - name: Authorization
        #   in: header
        #   required: true
        #   description: "Bearer token assigned to your webhook (e.g. `Bearer eyJhbGci...`)"
        #   schema:
        #     type: string
        #     example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhY2NvdW50SWQiOiI2OGI2ZTU0YmNiMjBhY2MyMzEyMjU0NzkiLCJpYXQiOjE3NTkzNDQ1NTJ9.xBODZJosMKE1N22YHYT1zd2ZuuVmJqS3v5qq9IE8U-4"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Metadata:
                  type: object
                  properties:
                    LocationInformation:
                      type: array
                      items:
                        type: object
                        properties:
                          SerialNumber:
                            type: string
                            example: "LOATD00876"
                          Name:
                            type: string
                            example: "Opal Demo"
                          StoreId:
                            type: string
                            nullable: true
                          Location:
                            type: string
                            example: "Opal"
                    MessageId:
                      type: string
                      example: "767b8fbb-f948-413f-acad-15736aee785b"
                    CorrelationId:
                      type: string
                      example: "eb221b40-53cb-4449-a5c0-bd761180b67e"

                Transactions:
                  type: array
                  items:
                    type: object
                    properties:
                      PickupGroupId:
                        type: integer
                        example: 566758091
                      SerialNumber:
                        type: string
                        example: "LOATD00876"
                      RetrievedOn:
                        type: string
                        format: date-time
                        example: "2025-03-27T17:33:05.4670000Z"
                      TransactionDateTime:
                        type: string
                        format: date-time
                        example: "2025-04-11T03:01:10"
                      UserName:
                        type: string
                        example: "TITAN"
                      TransactionType:
                        type: string
                        example: "CashIn"
                      Amount:
                        type: number
                        example: 25
                      DoorName:
                        type: string
                        example: "Main vault opened"
                      Denominations:
                        type: array
                        items:
                          type: object
                          properties:
                            UnitValue:
                              type: number
                              example: 5
                            Count:
                              type: integer
                              example: 1
                            Currency:
                              type: string
                              example: "USD"
                      Register:
                        type: string
                        example: "0"

      responses:
        200:
          description: "Successful webhook request"
          content:
            application/json:
              example:
                status: "success"
                message: "Webhook request created."

      # security: [] # No authentication required for login

  /api/users/super-admin-login:
    post:
      tags:
        - Authorize -  Super-admin only
      summary: "1. Copy access_token from response || 2. Click Authorize button   ||  3. Place access_token in input box to authorize.   ||  4.Also visit Useful details which resembles details of all existing merchant accounts"
      description: |
        - Accessible only for `Super-admin`
        - Copy `access_token` from response  
        - Click the **Authorize** button  
        - Place `access_token` in the input box to authorize.
        - Set `desired expiration time` for a session in days only.  
          Examples:  
          default is set to `1 day  (1d)`.

        - Visit  `machineDetails` which resembles `all merchant details`, onboarded `machine's serial numbers`, `transaction types`, and various possibilities of `transaction types`, `status`, `batches` of `card -connect integration` of all `merchant-accounts`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileEmail:
                  type: string
                  description: "User's mobile number or email"
                  example: "0000000000"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "0000000001"
                sessionExpirationTime:
                  type: string
                  description: "Set desired expiration time for a session in either seconds, minutes ,hours,days, weeks, or years. Example: For minutes- 5m; For hours- 5h; For days - 5d; For Weeks- 5w; For Years- 5y"
                  example: "1d"

      responses:
        200:
          description: "Successful login response"
          content:
            application/json:
              example:
                status: "success"
                message: "Login successfull."
                data:
                  accountId: "67eb81cb45715d3e5b678ebb"
                  accountType: "super-admin"
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2N2ViODFjYjQ1NzE1ZDNlNWI2NzhlYmQiLCJpYXQiOjE3NTkyMjIxMDIsImV4cCI6MTc1OTMwODUwMn0.vYun79q8JBBqshIWgETD0JpswclGaLjEt9wSN7fzePo"
                  usefulDetails:
                    categories:
                      - "cima-machine"
                      - "card-connect"
                    merchantNames:
                      - objectId: "67f5f980368cc56a87df8ca9"
                        merchantName: "fourtwo-2"
                      - objectId: "680213209f97bd8e0787c035"
                        merchantName: "DR-Testing"
                    webhookPayloadHeadersData:
                      serialNumbers:
                        - "QA0158"
                        - "QA0230"
                        - "QA0104"
                        - "..........to be continued"
                      transactionTypes:
                        - "ManualCashTransaction"
                        - "CashIn"
                        - "LockOpened"
                        - "LockClosed"
                        - "DoorWhine"
                        - "DoorClosed"
                    # allMerchantCardConnectPayloadHeaders:
                    #   transactionStatusKeys:
                    #     - "Auth"
                    #     - "Captured"
                    #     - "Voided"
                    #     - "Failure"
                    #     - "Rejected"
                    #     - "Declined"
                    #     - "Settled"
                    #     - "Processed"
                    #     - "Unknown"
                    #   transactionTypeKeys:
                    #     - "ACCOUNT VERIFY"
                    #     - "AUTH REQUEST"
                    #     - "CASH ADVANCE"
                    #     - "REFUND"
                    #     - "SALE"
                    #     - "UNKNOWN"
                    #     - "VOID REFUND"
                    #     - "VOID SALE"
                    #   customerDetails:
                    #     - cardBrand: "visa"
                    #       cardType: "Credit"
                    #       customerCardNumber: "47XXXXXXXXXX1443"
                    #   batches:
                    #     - batchId: 104
                    #     - batchId: 106

      security: [] # No authentication required for login

  /api/merchants/users/merchant-login:
    post:
      tags:
        - Authorize -  Merchant only
      summary: "1. Copy access_token from response || 2. Click Authorize button   ||  3. Place access_token in input box to authorize.  ||  4.Also visit Useful details which resembles details of respective logged-in account only."
      description: |
        - For `Merchant's` login only.
        - Copy `access_token` from response  
        - Click the **Authorize** button  
        - Place `access_token` in the input box to authorize.
        - Set `desired expiration time` for a session in days only.  
          Examples:  
          default is set to `1 day  (1d)`.

        - Visit  `machineDetails` which resembles `all merchant details`, onboarded `machine's serial numbers`, `transaction types`, and various possibilities of `transaction types`, `status`, `batches` of `card -connect integration` of respective logged-in `merchant-account` only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileEmail:
                  type: string
                  description: "User's mobile number or email"
                  example: "9989765432"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "Integrations9@"
                sessionExpirationTime:
                  type: string
                  description: "Set desired expiration time for a session in either seconds, minutes ,hours,days, weeks, or years. Example: For minutes- 5m; For hours- 5h; For days - 5d; For Weeks- 5w; For Years- 5y"
                  example: "1d"
      responses:
        200:
          description: "Successful login response"
          content:
            application/json:
              example:
                status: "success"
                message: "Login successfull."
                data:
                  accountId: "67eb81cb45715d3e5b678ebb"
                  accountType: "merchant"
                  access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2N2ViODFjYjQ1NzE1ZDNlNWI2NzhlYmQiLCJpYXQiOjE3NTkyMjIxMDIsImV4cCI6MTc1OTMwODUwMn0.vYun79q8JBBqshIWgETD0JpswclGaLjEt9wSN7fzePo"
                  usefulDetails:
                    categories:
                      - "cima-machine"
                      - "card-connect"
                    merchantNames:
                      - objectId: "67f5f980368cc56a87df8ca9"
                        merchantName: "fourtwo-2"
                      - objectId: "680213209f97bd8e0787c035"
                        merchantName: "DR-Testing"
                    webhookPayloadHeadersData:
                      serialNumbers:
                        - "QA0158"
                        - "QA0230"
                        - "QA0104"
                        - "..........to be continued"
                      transactionTypes:
                        - "ManualCashTransaction"
                        - "CashIn"
                        - "LockOpened"
                        - "LockClosed"
                        - "DoorWhine"
                        - "DoorClosed"
                    # cardConnectPayloadHeaders:
                    #   transactionStatusKeys:
                    #     - "Auth"
                    #     - "Captured"
                    #     - "Voided"
                    #     - "Failure"
                    #     - "Rejected"
                    #     - "Declined"
                    #     - "Settled"
                    #     - "Processed"
                    #     - "Unknown"
                    #   transactionTypeKeys:
                    #     - "ACCOUNT VERIFY"
                    #     - "AUTH REQUEST"
                    #     - "CASH ADVANCE"
                    #     - "REFUND"
                    #     - "SALE"
                    #     - "UNKNOWN"
                    #     - "VOID REFUND"
                    #     - "VOID SALE"
                    #   customerDetails:
                    #     - cardBrand: "visa"
                    #       cardType: "Credit"
                    #       customerCardNumber: "47XXXXXXXXXX1443"
                    #   batches:
                    #     - batchId: 104
                    #     - batchId: 106

      security: [] # No authentication required for login

  /api/machines/get-machine-transactions:
    get:
      tags:
        - Authorize -  Super-admin only
      summary: "Retrieve statistical insights for an individual or multiple machines of all merchants based on desired filters"
      description: |
        - This API provides detailed insights about a machines `(single or multiple)`  of `all merchants` based on desired filters.  
        - Details about all onboarded machines of all merchants can be retreived [super-admin]
        - By providing query parameters, users can retrieve denomination details, transaction summaries, and other key performance metrics.  
          The available query parameters are:  
          - `serialNumbers`: Filter by the machine's serial numbers. `(e.g., QA0158, QA0230, QA0104, QA0275 )` 
          - `transactionTypes`: Filter by the types of transaction `(e.g., CashIn, CashOut, LockClosed, DoorWhine, ManualCashTransaction)`.  
          - `fromDate`: Retrieve records from this date onward.  `(e.g., 2025-04-21T10:40Z)`
          - `toDate`: Retrieve records up to this date.  `(e.g., 2025-04-28T10:40Z)`
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: serialNumbers
          in: query
          schema:
            type: string
          description: "Unique serial number (or) numbers identifying the machine. (e.g., QA0275,QA0068,QA0120) "

        - name: transactionTypes
          in: query
          schema:
            type: string
          description: "Desired transaction type (or) types (e.g., CashIn,CashOut,DoorClosed)"

        - name: fromDate
          in: query
          schema:
            type: string
          description: "Desired date from which data to be retreived from.(e.g., 2025-04-21T19:09Z) "

        - name: toDate
          in: query
          schema:
            type: string
          description: "Desired date to which data to be retreived from. (e.g., 2025-04-28T20:09Z)"

      responses:
        200:
          description: Machine / Machine's  transactions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Machine / Machine's  transactions.
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "67eceef889c3a34af5486760"
                        # webhookMasterId:
                        #   type: string
                        #   example: "67eb8490233046c701342349"
                        # webhookMetaPayloadId:
                        #   type: string
                        #   example: "67eb8588233046c70134244c"
                        # accountId:
                        #   type: string
                        #   example: "67eb81cb45715d3e5b678ebb"
                        pickupGroupId:
                          type: integer
                          example: 566758091
                        serialNumber:
                          type: string
                          example: "QA00577"
                        retrievedOn:
                          type: string
                          format: date-time
                          example: "2025-03-27T17:33:05.4670000Z"
                        transactionDateTime:
                          type: string
                          example: "2025-03-27T09:57:05"
                        userName:
                          type: string
                          example: "TITAN"
                        transactionType:
                          type: string
                          example: "CashIn"
                        amount:
                          type: number
                          example: 10
                        denominations:
                          type: array
                          items:
                            type: object
                            properties:
                              UnitValue:
                                type: number
                                example: 5
                              Count:
                                type: integer
                                example: 2
                              Currency:
                                type: string
                                example: "USD"
                        location:
                          type: string
                          example: "Opal"
                        status:
                          type: string
                          example: "active"
                        createdAt:
                          type: string
                          format: date-time
                          example: "2025-04-02T18:02:00.120Z"
                        updatedAt:
                          type: string
                          format: date-time
                          example: "2025-04-02T08:02:00.120Z"
                        webhookTransactionId:
                          type: string
                          example: "67eceef889c3a34af5486760"
                        __v:
                          type: integer
                          example: 0

  /api/merchants/machines/get-machine-transactions:
    get:
      tags:
        - Authorize -  Merchant only
      summary: "Retrieve statistical insights for an individual or multiple machines respective `logged-in merchant` based on desired filters"
      description: |
        - This API provides detailed insights about a machines `(single or multiple)`  of respective `logged-in merchant` based on desired filters.  
        - Details about all onboarded machines of `logged-in merchant` can be retreived. 
        - By providing query parameters, users can retrieve denomination details, transaction summaries, and other key performance metrics.  
          The available query parameters are:  
          - `serialNumbers`: Filter by the machine's serial numbers. `(e.g., QA0158, QA0230, QA0104, QA0275 )` 
          - `transactionTypes`: Filter by the types of transaction `(e.g., CashIn, CashOut, LockClosed, DoorWhine, ManualCashTransaction)`.  
          - `fromDate`: Retrieve records from this date onward.  `(e.g., 2025-04-21T10:40Z)`
          - `toDate`: Retrieve records up to this date.  `(e.g., 2025-04-28T10:40Z)`
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: serialNumbers
          in: query
          schema:
            type: string
          description: "Unique serial number (or) numbers identifying the machine. (e.g., QA0275,QA0068,QA0120) "

        - name: transactionTypes
          in: query
          schema:
            type: string
          description: "Desired transaction type (or) types (e.g., CashIn,CashOut,DoorClosed)"

        - name: fromDate
          in: query
          schema:
            type: string
          description: "Desired date from which data to be retreived from.(e.g., 2025-04-21T19:09Z) "

        - name: toDate
          in: query
          schema:
            type: string
          description: "Desired date to which data to be retreived from. (e.g., 2025-04-28T20:09Z)"

      responses:
        200:
          description: Machine / Machine's  transactions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
