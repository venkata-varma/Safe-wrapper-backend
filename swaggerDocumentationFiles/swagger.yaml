  /api/merchants/machines/merchant-smart-filtered-dashboard/{accountId}:
    get:
      tags:
        - Authorize -  Merchant only
      summary: "Retrieve statistical insights for both CIMA-machine and Card-connect transactions of  respective `logged-in merchant` based on desired filters"
      description: |
        - Visit `machineDetails` during `login` to see options allocated to you to use here.     
        - This API provides statistical insights for both `CIMA-machine` and `Card-connect` transactions of  respective `logged-in merchant` based on desired filters.  
        - Below fields are `mandatory` in `params`:-
           - `accountId` - `params`  `(e.g., 68b6e54bcb20acc231225454)`
        - Below fields are `mandatory` in `query`  that respects both or either of payment-types `(cima-machine or card-connect)`:-
          - `selectDashboard` (Payment type) - `query`  `(e.g., cima-machine, card-connect)` 
          - `merchantNames` -  `query`  `(e.g., 680213209f97bd8e0787c035,67f5f980368cc56a87df8ca9)`. `Id's` will be found while you `login` 
          - `fromDate`  -  `select time and date to retreive transactions from this date & time`  `(e.g., 2025-09-10T05:50Z)`
          - `toDate`  -  `select time and date to retreive transactions upto this date & time`   `(e.g., 2025-09-10T15:50Z)`

        - By providing below query parameters which are `optional`, results will be filtered based on your desired filters 
          cima-machine filter options:  
          - `serialNumbers`  :  `(None or single or multiple)` Filter by the machine's serial numbers. `(e.g., QA0158, QA0230, QA0104, QA0275 )` 
          - `cashTransactionTypes`  : `(None or single or multiple)`   Filter by the types of transaction `(e.g., CashIn, CashOut, LockClosed, DoorWhine, ManualCashTransaction)`. 
          card-connect filter options: 
          - `batchNumber` : `(None or single or multiple)`   Give desired Batch Id  to retreive transactions of respective batch  `(e.g., 104,105,106 )`
          - `cardTransactionTypes` :  Retrieve records up to this date.  `(e.g.,SALE,REFUND,ACCOUNT VERIFY,AUTH REQUEST, CASH ADVANCE,VOID SALE,VOID REFUND )`
          - `customerDetails` :  `(None or single or multiple)` Paritally hidden card number `(e.g., 47XXXXXXXXXX1444,47XXXXXXXXXX1443)`
          - `cardTransactionStatus` :  `(None or single or multiple)` Give desired status or stauses seperate by commas to get transactions of respective given statuses `(e.g., Processed, Rejected,Auth, Captured,Voided,Failure)`
        - Requires authentication via the `Authorization` header.
      security:
        - Authorization: [] # Requires Authorization header with token
      parameters:
        - name: accountId
          in: path
          required: true
          description: "Unique identifier for the account"
          schema:
            type: string
            example: 68b6e54bcb20acc231225479

        - name: selectDashboard
          in: query
          description: "Choose one or more dashboards (hold Ctrl to select multiple)"
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - cima-machine
                - card-connect
                - snow
                - others

        - name: merchantNames
          in: query
          description: "Unique Id's of Merchant name(s), comma-separated. Id's will be found while you login."
          schema:
            type: string
            example: "680213209f97bd8e0787c035,67f5f980368cc56a87df8ca9"

        - name: fromDate
          in: query
          description: "Start date (ISO format)"
          schema:
            type: string
            format: date-time
            example: 2025-01-10T05:50Z

        - name: toDate
          in: query
          description: "End date (ISO format)"
          schema:
            type: string
            format: date-time
            example: 2025-01-10T05:56Z

        - name: serialNumbers
          in: query
          description: "Serial number(s) of CIMA-machine's, comma-separated"
          schema:
            type: string
            example: "QA0230, QA0158"

        - name: cashTransactionTypes
          in: query
          description: "Cash transaction type(s), comma-separated"
          schema:
            type: string
            example: "CashIn, ManualCashTransaction, LockOpened, DoorWhine"

        - name: batchNumber
          in: query
          description: "Batch id to retreive transactions of respective batch"
          schema:
            type: string
            example: "100,101"

        - name: cardTransactionTypes
          in: query
          description: "Card transaction type(s), comma-separated"
          schema:
            type: string
            example: "REFUND, SALE, VOID REFUND"

        - name: customerDetails
          in: query
          description: "Customer card details (Partially hidden) , comma-separated"
          schema:
            type: string
            example: "47XXXXXXXXXX1444, 47XXXXXXXXXX1443"

        - name: cardTransactionStatus
          in: query
          description: "Card transaction status"
          schema:
            type: string
            example: "Processed, Rejected, Auth, Captured, Failure"

      responses:
        200:
          description: Smart filtered transaction's data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Smart filtered transaction's data retreived succesfully."
                  data:
                    type: object
                    properties:
                      cimaMachineTransactionsCount:
                        type: integer
                        example: 0
                      cardConnectTransactionsCount:
                        type: integer
                        example: 22
                      cashAndCardMixResultArray:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: "68c28dc2e08cfb5a3549248b"
                            referenceId:
                              type: string
                              example: "252273002845"
                            customerDetails:
                              type: object
                              properties:
                                cardNumber:
                                  type: string
                                  example: "47XXXXXXXXXX1443"
                                cardBrand:
                                  type: string
                                  example: "visa"
                                cardType:
                                  type: string
                                  example: "Credit"
                            referenceStatus:
                              type: string
                              example: "Processed"
                            createdAt:
                              type: string
                              format: date-time
                              example: "2025-09-11T08:52:18.244Z"
                            updatedAt:
                              type: string
                              format: date-time
                              example: "2025-09-11T08:52:18.244Z"
                            __v:
                              type: integer
                              example: 0
                            amount:
                              type: number
                              example: -9
                            customerByCard:
                              type: string
                              example: "47XXXXXXXXXX1443"
                            transactionType:
                              type: string
                              example: "REFUND"
                            transactionStatus:
                              type: string
                              example: "Processed"
                            merchantId:
                              type: string
                              example: "800000019059"
                            currency:
                              type: string
                              example: "USD"
                            date:
                              type: string
                              format: date
                              example: "2025-09-09T00:00:00.000Z"
                            batchId:
                              type: string
                              example: "112"
                            paymentType:
                              type: string
                              example: "card-connect"
                            transactionDate:
                              type: string
                              format: date-time
                              example: "2025-09-09T00:47:25.000Z"
                      getSummaryDetailsQueryFunction:
                        type: array
                        items:
                          type: object
                          properties:
                            totalTransactionsCount:
                              type: integer
                              example: 22
                            successfulTransactionsCount:
                              type: integer
                              example: 22
                            failureTransactionsCount:
                              type: integer
                              example: 0
                            totalAmount:
                              type: number
                              example: 174
                            totalUsers:
                              type: integer
                              example: 1
                            totalRefundedTransactionsCount:
                              type: integer
                              example: 3
                            totalRefundedAmount:
                              type: number
                              example: 23
                            totalBatches:
                              type: integer
                              example: 4
                            totalMerchantsSelected:
                              type: integer
                              example: 1
                            paymentType:
                              type: string
                              example: "card-connect"

