openapi: 3.0.0
info:
  title: "Express API for Integrations hub- Devrabbit"
  version: "1.0.0"
  description: "This is a REST API application made with Express. It retrieves data from JSONPlaceholder."
  license:
    name: "Licensed Under MIT"
    url: "https://spdx.org/licenses/MIT.html"
  contact:
    name: "Devrabbit"
    url: "https://hub.dev.isyncrabbit.com/auth/login"

servers:

  - url: "http://localhost:8201"
    description: "Local Development Server"

components:
  securitySchemes:
    Authorization:
      type: http
      scheme: bearer
      bearerFormat: JWT
     

  schemas:  # This should be properly indented
    User:  # The User schema should be correctly nested under schemas
      type: object
      properties:
        userId:
          type: string
          format: uuid
          description: "Unique identifier for the user."
          nullable: true
        accountId:
          type: string
          format: uuid
          description: "Reference to the account the user belongs to."
          nullable: true
        name:
          type: string
          description: "Full name of the user."
          example : "Devrabbit client"
          default: ""
        password:
          type: string
          description: "Hashed password of the user."
          default: ""
        role:
          type: string
          enum: ["super-admin", "admin", "manager", "support"]
          description: "Role assigned to the user."
          default: "admin"
        phone:
          type: string
          description: "User's phone number."
          pattern: "^[0-9]+$"
          minLength: 10
          maxLength: 15
          example : "0000000000"
          default: ""
        email:
          type: string
          format: email
          description: "User's email address."
          example : "nine123@devrabbit.com"
          default: ""
        status:
          type: string
          enum: ["active", "deleted", "blocked"]
          description: "Current status of the user."
          default: "active"
        createdBy:
          type: string
          format: uuid
          description: "Reference to the user who created this record."
          nullable: true
        updatedBy:
          type: string
          format: uuid
          description: "Reference to the user who last updated this record."
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when the user was created."
        updatedAt:
          type: string
          format: date-time
          description: "Timestamp when the user was last updated."

paths:
  /api/users/user-login:
    post:
      tags:
        - Authorize
      summary:  "1. Copy access_token from response\n 2. Click Authorize button\n 3. Place access_token in input box to authorize."
      description: |
          1. Copy `access_token` from response  
          2. Click the **Authorize** button  
          3. Place `access_token` in the input box to authorize.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileEmail:
                  type: string
                  description: "User's mobile number or email"
                  example: "0000000000"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "0000000001"
      # responses:
      #   '200':
      #     description: "Login successfull."
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             accessToken:
      #               type: string
      #               description: "JWT token for authorization"
      #             expirationTime:
      #               type: string
      #               description: "Expiration time of JWT token"
      #   '401':
      #     description: "Unauthorized - Invalid Password."
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             status:
      #               type: string
      #               example: "fail"
      #               description: "Indicates the failure status"
      #             message:
      #               type: string
      #               example: "Invalid Password."
      #               description: "Error message explaining the issue"
      #   '400':
      #     description: "Missing fields in payload to raise the request"
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             status:
      #               type: string
      #               example: "fail"
      #               description: "Indicates the failure status"
      #             message:
      #               type: string
      #               example: "Mobile-Email and Password fields are mandatory."
      #               description: "Mobile-Email and Password fields are mandatory."
                       
      security: []  # No authentication required for login


  /api/accounts/create-account:
    post:
      tags:
        - Accounts
      summary: "Create account for first-time visitor"
      description: |
          - Provide the required account details  
          - Upload a profile logo (PNG, JPG)  
          - The image will be stored in S3, and the URL will be saved  
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                accountName:
                  type: string
                  description: "Name of the account"
                  example: "fourtwo"
                companyName:
                  type: string
                  description: "Company name"
                  example: "fourtwo"
                phone:
                  type: string
                  description: "User's phone number"
                  example: "9550007949"
                email:
                  type: string
                  format: email
                  description: "User's email"
                  example: "nine@devrabbit.com"
                password:
                  type: string
                  format: password
                  description: "User's password"
                  example: "9550007949"
                address:
                  type: string
                  description: "Street address"
                  example: "3910 S. IH 35 Suite 205"
                city:
                  type: string
                  description: "City"
                  example: "Austin, TX 78704"
                state:
                  type: string
                  description: "State"
                  example: "Texas"
                country:
                  type: string
                  description: "Country"
                  example: "USA"
                pincode:
                  type: string
                  description: "Zip code"
                  example: "78704"
                accountType:
                  type: string
                  description: "Type of account (customer, admin, etc.)"
                  example: "customer"
                timeZone:
                  type: string
                  description: "User's time zone"
                  example: "IST"
                logo:
                  type: string
                  format: binary
                  description: "Upload profile logo (PNG, JPG)"

  /api/users/create-user:
   post:
    tags:
      - Users
    summary: "Provision for super-admin of an account to create a user within the same account. Limit is 4 users per account."
    description: |
      This endpoint allows the super-admin of an account to create a new user within the same account.  
      - A maximum of 4 users can be created per account.  
      - The `name`, `email`, `phone`, and `password` fields are mandatory.  
      

    security:
      - Authorization: []  # Requires Authorization header with token
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: "Full name of the user"
                example: "John Doe"
              email:
                type: string
                format: email
                description: "User's email address"
                example: "john.doe@example.com"
              phone:
                type: string
                description: "User's phone number"
                example: "1234567890"
              password:
                type: string
                format: password
                description: "User's password"
                example: "SecureP@ssw0rd"
              companyName:
                type: string
                description: "Name of the company"
                example: "Tech Corp"
              address:
                type: string
                description: "User's address"
                example: "123 Main St"
              city:
                type: string
                description: "City name"
                example: "Austin"
              state:
                type: string
                description: "State name"
                example: "Texas"
              country:
                type: string
                description: "Country name"
                example: "USA"
              pincode:
                type: string
                description: "Postal code"
                example: "78704"
              accountType:
                type: string
                description: "Type of account (e.g., customer, admin)"
                example: "customer"
              timeZone:
                type: string
                description: "User's time zone"
                example: "IST"
            required:
              - name
              - email
              - phone
              - password


  /api/users/get-user-details/{userId}:
    get:
      tags:
        - Users
      summary: "Get user details"
      description: "Returns user profile data. Requires authentication."
      security:
        - Authorization: []  # Requires Authorization header with token
      parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user to retrieve"
          schema:
            type: string
      # responses:
      #   '200':
      #     description: "User profile retrieved successfully"
      #     content:
      #       application/json:
      #         schema:
      #           $ref: '#/components/schemas/User'
      #   '401':
      #     description: "Unauthorized - Invalid Password."
      #     content:
      #       application/json:
      #         schema:
      #           type: object
      #           properties:
      #             status:
      #               type: string
      #               example: "fail"
      #               description: "Indicates the failure status"
      #             message:
      #               type: string
      #               example: "Authentication failed. We required access token."
      #               description: "Error message explaining the issue"

  /api/users/update-password/{userId}:
   patch:
     tags:
      - Users
     summary: "Update user password"
     description: |
       Allows an authenticated user to update their password.  
       - The user must provide their **current password** and the **new password**.  
       - Both **currentPassword** and **newPassword** fields are **mandatory**.  
       Requires authentication via `Authorization` header.
     security:
        - Authorization: []  # Requires Authorization header with token
     parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user whose password is to be updated"
          schema:
            type: string
     requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: "**Mandatory** - The current password of the user"
                  example: "0000000001"
                newPassword:
                  type: string
                  format: password
                  description: "**Mandatory** - The new password to be set"
                  example: "0000000001"

  /api/users/update-user-details/{userId}:
   patch:
     tags:
      - Users
     summary: "Update user details"
     description: |
       Allows an authenticated user to update their details.  
       - All fields are **optional**, and the user can update any field they wish.  
       - Requires authentication via the `Authorization` header.
     security:
        - Authorization: []  # Requires Authorization header with token
     parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user whose details are to be updated"
          schema:
            type: string
     requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "User's name"
                  example: "fourtwo-2"
                companyName:
                  type: string
                  description: "User's company name"
                  example: "fourtwo"
                phone:
                  type: string
                  description: "User's phone number"
                  example: "0000000000"
                email:
                  type: string
                  format: email
                  description: "User's email address"
                  example: "nine123@devrabbit.com"


  /api/users/update-user-status/{userId}:
   patch:
     tags:
      - Users
     summary: "To update user status - Only super-admin users are allowed"
     description: |
       Allows a **super-admin** to update a user's status.  
       - The **status** field must be either **active** or **deleted**.  
       - Only **super-admin** users have permission to perform this action.  
       Requires authentication via `Authorization` header.
     security:
        - Authorization: []  # Requires Authorization header with token
     parameters:
        - name: userId
          in: path
          required: true
          description: "The ID of the user whose status is to be updated"
          schema:
            type: string
     requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: "**Mandatory** - The status to be updated"
                  enum: ["active", "deleted"]
                  example: "deleted / active"

  /api/users/get-all-users/{accountId}:
   get:
     tags:
      - Users
     summary: "Get all users under an account - Only super-admin users are allowed"
     description: |
       Retrieves all users associated with a specific `accountId`.  
       - Only **super-admin** users have permission to access this endpoint.  
       Requires authentication via `Authorization` header.
     security:
        - Authorization: []  # Requires Authorization header with token
     parameters:
        - name: accountId
          in: path
          required: true
          description: "The ID of the account whose users are to be fetched"
          schema:
            type: string
                 

                 